name: youniverse

services:
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER in .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app_network

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
    command: ["npx", "prisma", "migrate", "deploy"]
    depends_on:
      db:
        condition: service_healthy
    restart: "no"
    networks:
      - app_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      PORT: 4000
      TRUST_PROXY: 1
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET in .env}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-1d}
      FRONTEND_URL: ${FRONTEND_URL:?Set FRONTEND_URL in .env}
      ADMIN_URL: ${ADMIN_URL:?Set ADMIN_URL in .env}
      BACKEND_URL: ${BACKEND_URL:?Set BACKEND_URL in .env}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      EMAIL_FROM_NAME: ${EMAIL_FROM_NAME:-YOUniverse}
      EMAIL_FROM_ADDRESS: ${EMAIL_FROM_ADDRESS:-no-reply@youniverse.io.vn}
      EMAIL_SMTP_HOST: ${EMAIL_SMTP_HOST:-}
      EMAIL_SMTP_PORT: ${EMAIL_SMTP_PORT:-587}
      EMAIL_SMTP_USER: ${EMAIL_SMTP_USER:-}
      EMAIL_SMTP_PASSWORD: ${EMAIL_SMTP_PASSWORD:-}
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "127.0.0.1:${BACKEND_PORT:-4000}:4000"
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4000/api/v1/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL in .env}
        NEXT_PUBLIC_SITE_URL: ${FRONTEND_URL:?Set FRONTEND_URL in .env}
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    restart: unless-stopped
    init: true
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      API_INTERNAL_URL: http://backend:4000/api/v1
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL in .env}
      NEXT_PUBLIC_SITE_URL: ${FRONTEND_URL:?Set FRONTEND_URL in .env}
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${GOOGLE_MAPS_API_KEY:-}
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3000}:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - app_network

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${NEXT_PUBLIC_API_URL:?Set NEXT_PUBLIC_API_URL in .env}
    restart: unless-stopped
    ports:
      - "127.0.0.1:${ADMIN_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - app_network

volumes:
  postgres_data:
  backend_uploads:

networks:
  app_network:
    driver: bridge
